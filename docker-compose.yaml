version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: capella-backend
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    networks:
      - app-network
      - coolify-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.capella-backend.loadbalancer.server.port=3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun --eval "fetch(''http://localhost:3001/health'').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s

  marketing:
    build:
      context: .
      dockerfile: apps/marketing/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    container_name: capella-marketing
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - INTERNAL_API_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - app-network
      - coolify-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.capella-marketing.loadbalancer.server.port=3000"
      - "traefik.docker.network=coolify"
    # healthcheck:
    #   test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/robots.txt"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s

  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    container_name: capella-cms
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.capella-cms.loadbalancer.server.port=80"

  # stripe:
  #   image: stripe/stripe-cli:latest
  #   container_name: capella-stripe
  #   command: listen --forward-to http://localhost:3001/api/payments/webhook --api-key ${STRIPE_SECRET_KEY}
  #   environment:
  #     - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
  #   profiles:
  #     - dev
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge
  coolify-network:
    external: true
    name: ${COOLIFY_DB_NETWORK:-coolify}
